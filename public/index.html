<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EDDIE AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #00d4ff;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.65;
      padding: 12px 16px;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      align-self: flex-end;
      color: #c9d1ff;
    }

    .message.assistant {
      background: #111;
      border: 1px solid #222;
      align-self: flex-start;
      color: #e8e8e8;
    }

    .message.assistant .name {
      font-size: 0.7rem;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #00d4ff;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #input-area {
      padding: 16px;
      background: #111;
      border-top: 1px solid #222;
    }

    #input-area form {
      display: flex;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8e8;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
      font-family: inherit;
    }

    #user-input:focus {
      border-color: #00d4ff44;
      box-shadow: 0 0 0 2px #00d4ff18;
    }

    #send-btn {
      background: #00d4ff;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }

    #send-btn:hover { background: #00b8d9; }
    #send-btn:disabled { background: #333; color: #555; cursor: not-allowed; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #333;
    }

    .empty-state .big { font-size: 2.5rem; font-weight: 800; color: #1a1a1a; letter-spacing: 3px; }
    .empty-state .hint { font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">EDDIE</div>
      <div class="subtitle">Personal AI Assistant</div>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="big">EDDIE AI</div>
      <div class="hint">Ask me anything. I'm direct, fast, and actually useful.</div>
    </div>
  </div>

  <div id="input-area">
    <form id="chat-form">
      <textarea
        id="user-input"
        placeholder="Message EDDIE..."
        rows="1"
        autocomplete="off"
        autofocus
      ></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const form = document.getElementById('chat-form');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const emptyState = document.getElementById('empty-state');

    const history = [];

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });

    // Submit on Enter (Shift+Enter = new line)
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });

    function appendMessage(role, text) {
      emptyState.style.display = 'none';
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'assistant') {
        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = 'EDDIE';
        div.appendChild(name);
      }
      const body = document.createElement('span');
      body.textContent = text;
      div.appendChild(body);
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return body;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);
      history.push({ role: 'user', content: text });

      const bodyEl = appendMessage('assistant', '');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bodyEl.parentElement.appendChild(cursor);

      let accumulated = '';

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') break;
            try {
              const parsed = JSON.parse(payload);
              if (parsed.error) {
                bodyEl.textContent = parsed.error;
              } else if (parsed.text) {
                accumulated += parsed.text;
                bodyEl.textContent = accumulated;
                chatEl.scrollTop = chatEl.scrollHeight;
              }
            } catch (_) {}
          }
        }
      } catch (err) {
        bodyEl.textContent = 'Connection error. Is the server running?';
      }

      cursor.remove();
      history.push({ role: 'assistant', content: accumulated });
      sendBtn.disabled = false;
      inputEl.focus();
    });
  </script>
</body>
</html>
